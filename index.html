<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Route-Master Mobile</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --danger: #ef4444; }
        body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --primary: #3b82f6; }
        
        body { font-family: -apple-system, sans-serif; padding: env(safe-area-inset-top) 15px 40px 15px; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        h1 { color: var(--primary); text-align: center; font-size: 1.4rem; margin-bottom: 20px; }
        h3 { font-size: 0.9rem; margin: 0 0 10px 0; opacity: 0.8; }
        
        textarea { width: 100%; height: 80px; border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 14px; }
        .controls { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); flex-grow: 1; font-size: 14px; }

        button { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: #64748b; color: white; }
        .btn-save { background: #22c55e; color: white; width: 100%; padding: 16px; margin-top: 20px; font-size: 1rem; border-radius: 14px; }
        .btn-danger { background: var(--danger); color: white; }

        /* Listen-Layout (Optimiert für iPhone Breite) */
        .route-block { border: 1px solid var(--border); border-radius: 14px; margin-top: 15px; background: var(--card); overflow: hidden; }
        .route-header { background: var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 0.9rem; }
        
        .segment-main { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .segment-info { display: flex; align-items: center; gap: 10px; }
        .segment-actions { display: flex; gap: 6px; }
        
        .counter-badge { background: var(--primary); color: white; border-radius: 6px; padding: 4px 8px; font-weight: bold; font-size: 0.8rem; min-width: 50px; text-align: center; }
        .segment-details { display: none; background: var(--bg); padding: 5px 15px; }
        .stop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <h1 id="titleHeader">🛠 ROUTE-MASTER MOBILE</h1>

    <div class="card">
        <h3>Projekt laden</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button class="btn-sec" onclick="loadProjectFile()">Laden</button>
        </div>
    </div>

    <div class="card">
        <h3>ITN Import</h3>
        <textarea id="itnInput" placeholder="ITN Daten hier rein..."></textarea>
        <div class="controls">
            <input type="text" id="mainRouteName" placeholder="Name">
            <input type="text" id="routePrefix" placeholder="ID" style="width: 45px;">
            <button class="btn-primary" onclick="importITN()">+</button>
        </div>
    </div>

    <div id="editorArea"></div>
    <button class="btn-save" id="saveBtn" style="display:none;" onclick="downloadJSON()">💾 GESAMT-JSON SPEICHERN</button>
</div>

<script>
    let projectData = { touren: [] };

    function updateTheme() {
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 7) { 
            document.getElementById('mainBody').classList.add('dark-mode');
            document.getElementById('titleHeader').innerText = "🌙 ROUTE-MASTER MOBILE";
        }
    }

    function loadProjectFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { projectData = JSON.parse(e.target.result); renderEditor(); };
        reader.readAsText(file);
    }

    function importITN() {
        const input = document.getElementById('itnInput').value.trim();
        const name = document.getElementById('mainRouteName').value || "Neue Route";
        const prefix = document.getElementById('routePrefix').value || "00";
        if(!input) return;

        const lines = input.split(/\r?\n/).filter(l => l.trim() !== "");
        let points = [];
        lines.forEach(line => {
            const parts = line.split('|');
            if(parts.length >= 3) { points.push({ lat: parseFloat(parts[1])/100000, lng: parseFloat(parts[0])/100000, name: parts[2].trim() }); }
        });

        let tour = projectData.touren.find(t => t.id === prefix);
        if (!tour) { tour = { name: name, id: prefix, abschnitte: [] }; projectData.touren.push(tour); }

        let startIdx = tour.abschnitte.length;
        for (let i = 0; i < points.length; i += 10) {
            let chunk = points.slice(i, i + 10);
            let label = prefix + "-" + String(startIdx + Math.floor(i/10) + 1).padStart(2, '0');
            tour.abschnitte.push({ bezeichnung: label, stopps: chunk });
        }
        renderEditor();
    }

    function renderEditor() {
        const area = document.getElementById('editorArea');
        area.innerHTML = "";
        if(projectData.touren.length > 0) document.getElementById('saveBtn').style.display = "block";

        projectData.touren.forEach((tour, tIdx) => {
            let tourDiv = document.createElement('div');
            tourDiv.className = 'route-block';
            tourDiv.innerHTML = `<div class="route-header"><span onclick="editTourName(${tIdx})">${tour.id}: ${tour.name} ✏️</span><button class="btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="safeDeleteTour(${tIdx})">X</button></div>`;
            
            tour.abschnitte.forEach((abs, aIdx) => {
                let segDiv = document.createElement('div');
                let stopsHtml = abs.stopps.map((s, sIdx) => `
                    <div class="stop-item">
                        <span>${sIdx+1}. ${s.name}</span>
                        <button class="btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="safeDeleteStop(${tIdx}, ${aIdx}, ${sIdx}); event.stopPropagation();">X</button>
                    </div>`).join('');

                segDiv.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx}, ${aIdx})">
                        <div class="segment-info">
                            <div class="counter-badge">${abs.bezeichnung}</div>
                            <span style="font-size:0.8rem; opacity:0.7;">${abs.stopps.length} Stopps</span>
                        </div>
                        <div class="segment-actions">
                            <button class="btn-primary" onclick="openInMaps(${tIdx}, ${aIdx}); event.stopPropagation();">📍 Maps</button>
                            <button class="btn-danger" onclick="safeDeleteSegment(${tIdx}, ${aIdx}); event.stopPropagation();">X</button>
                        </div>
                    </div>
                    <div class="segment-details" id="details-${tIdx}-${aIdx}">${stopsHtml}</div>`;
                tourDiv.appendChild(segDiv);
            });
            area.appendChild(tourDiv);
        });
    }

    function editTourName(tIdx) {
        const newName = prompt("Name ändern:", projectData.touren[tIdx].name);
        if (newName) { projectData.touren[tIdx].name = newName; renderEditor(); }
    }

    function toggleDetails(tIdx, aIdx) {
        const el = document.getElementById(`details-${tIdx}-${aIdx}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function openInMaps(tIdx, aIdx) {
        const points = projectData.touren[tIdx].abschnitte[aIdx].stopps;
        const dest = `${points[points.length-1].lat},${points[points.length-1].lng}`;
        const ways = points.slice(0, -1).map(p => `${p.lat},${p.lng}`).join('|');
        window.open(`comgooglemaps://?saddr=&daddr=${dest}&waypoints=${ways}&directionsmode=driving`, '_blank');
    }

    function safeDeleteStop(tIdx, aIdx, sIdx) { if(confirm("Stopp löschen?")) { projectData.touren[tIdx].abschnitte[aIdx].stopps.splice(sIdx, 1); renderEditor(); document.getElementById(`details-${tIdx}-${aIdx}`).style.display = 'block'; } }
    function safeDeleteSegment(tIdx, aIdx) { if(confirm("Abschnitt löschen?")) { projectData.touren[tIdx].abschnitte.splice(aIdx, 1); renderEditor(); } }
    function safeDeleteTour(tIdx) { if(confirm("Tour löschen?")) { projectData.touren.splice(tIdx, 1); renderEditor(); } }

    function downloadJSON() {
        let filename = prompt("Speichern unter:", "route_export_" + new Date().toLocaleDateString('de-DE').replace(/\./g, '_'));
        if (!filename) return;
        if (!filename.endsWith(".json")) filename += ".json";
        const dataStr = JSON.stringify(projectData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }

    window.onload = updateTheme;
</script>
</body>
</html>
