<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Route-Master V11 (Focus-Move)</title>
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --primary: #3b82f6; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: env(safe-area-inset-top) 15px 40px 15px; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; }
        textarea { width: 100%; height: 100px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .controls { display: flex; gap: 8px; align-items: center; margin: 15px 0; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); flex-grow: 1; }
        button { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; font-size: 0.9rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: var(--secondary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; padding: 18px; margin-top: 20px; font-size: 1.1rem; }
        .btn-danger { background: var(--danger); color: white; }
        .route-block { border: 1px solid var(--border); border-radius: 14px; margin-top: 15px; background: var(--card); overflow: hidden; }
        .route-header { background: var(--border); padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        /* VERSCHIEBE-STYLING */
        .segment-row { border-bottom: 1px solid var(--border); transition: background 0.3s ease; }
        .row-active { background: #fef08a !important; color: #1e293b !important; border-left: 5px solid #eab308; }
        body.dark-mode .row-active { background: #854d0e !important; color: #ffffff !important; border-left: 5px solid #facc15; }
        
        .segment-main { display: flex; align-items: center; justify-content: space-between; padding: 12px; cursor: pointer; gap: 8px; }
        .segment-info { display: flex; align-items: center; gap: 8px; }
        .segment-actions { display: flex; gap: 4px; }
        .segment-details { display: none; background: var(--bg); padding: 10px; border-top: 1px inset var(--border); }
        .stop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        
        .counter-badge { background: var(--primary); color: white; border-radius: 6px; padding: 5px 12px; font-weight: bold; font-size: 0.9rem; min-width: 60px; text-align: center; border: 2px solid transparent; }
        .row-active .counter-badge { border-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        
        .btn-move { background: #64748b; color: white; padding: 8px 12px; font-size: 1.1rem; border-radius: 8px; }
        .btn-move:active { background: var(--primary); transform: scale(1.1); }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <h1 id="titleHeader">🛠 ROUTE-MASTER V11</h1>

    <div class="card">
        <h3>1. Projekt laden</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button class="btn-sec" onclick="loadProjectFile()">Einlesen</button>
            <button class="btn-danger" onclick="safeReset()">Reset</button>
        </div>
    </div>

    <div class="card">
        <h3>2. ITN Import</h3>
        <textarea id="itnInput" placeholder="ITN Daten hier einfügen..."></textarea>
        <div class="controls">
            <input type="text" id="mainRouteName" placeholder="Name">
            <input type="text" id="routePrefix" placeholder="ID" style="width: 50px;">
            <button class="btn-primary" onclick="importITN()">Hinzufügen</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Editor</h3>
        <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px;">💡 Badge (z.B. 07-01) tippen zum Markieren & Verschieben.</p>
        <div id="editorArea"></div>
        <button class="btn-save" id="saveBtn" style="display:none;" onclick="downloadJSON()">💾 GESAMT-JSON SPEICHERN</button>
    </div>
</div>

<script>
    let projectData = { touren: [] };
    let activeRowKey = null; // Speichert welche Zeile gerade gelb ist (Format: "tourIdx-segIdx")

    function updateTheme() {
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 7) { 
            document.getElementById('mainBody').classList.add('dark-mode');
            document.getElementById('titleHeader').innerText = "🌙 ROUTE-MASTER V11";
        }
    }

    function loadProjectFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { projectData = JSON.parse(e.target.result); renderEditor(); };
        reader.readAsText(file);
    }

    function importITN() {
        const input = document.getElementById('itnInput').value.trim();
        const name = document.getElementById('mainRouteName').value || "Neue Route";
        const prefix = document.getElementById('routePrefix').value || "00";
        if(!input) return;

        const lines = input.split(/\r?\n/).filter(l => l.trim() !== "");
        let points = [];
        lines.forEach(line => {
            const parts = line.split('|');
            if(parts.length >= 3) { points.push({ lat: parseFloat(parts[1])/100000, lng: parseFloat(parts[0])/100000, name: parts[2].trim() }); }
        });

        let tour = projectData.touren.find(t => t.id === prefix);
        if (!tour) { tour = { name: name, id: prefix, abschnitte: [] }; projectData.touren.push(tour); }

        for (let i = 0; i < points.length; i += 10) {
            let chunk = points.slice(i, i + 10);
            tour.abschnitte.push({ bezeichnung: "TEMP", stopps: chunk });
        }
        reindexSegments(tour);
        renderEditor();
    }

    function reindexSegments(tour) {
        tour.abschnitte.forEach((abs, idx) => {
            abs.bezeichnung = tour.id + "-" + String(idx + 1).padStart(2, '0');
        });
    }

    function renderEditor() {
        const area = document.getElementById('editorArea');
        area.innerHTML = "";
        if(projectData.touren.length > 0) document.getElementById('saveBtn').style.display = "block";

        projectData.touren.forEach((tour, tIdx) => {
            let tourDiv = document.createElement('div');
            tourDiv.className = 'route-block';
            tourDiv.innerHTML = `<div class="route-header"><span onclick="editTourName(${tIdx})">Route ${tour.id}: <u>${tour.name}</u> ✏️</span><button class="btn-danger" style="padding:5px 10px; font-size:0.7rem;" onclick="safeDeleteTour(${tIdx})">Tour löschen</button></div>`;
            
            tour.abschnitte.forEach((abs, aIdx) => {
                let segDiv = document.createElement('div');
                segDiv.className = 'segment-row';
                const currentKey = `${tIdx}-${aIdx}`;
                if (activeRowKey === currentKey) segDiv.classList.add('row-active');
                
                let stopsHtml = abs.stopps.map((s, sIdx) => `
                    <div class="stop-item">
                        <span>${sIdx+1}. ${s.name}</span>
                        <button class="btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="safeDeleteStop(${tIdx}, ${aIdx}, ${sIdx}); event.stopPropagation();">X</button>
                    </div>`).join('');

                segDiv.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx}, ${aIdx})">
                        <div class="segment-info">
                            <button class="btn-move" onclick="moveSeg(event, ${tIdx}, ${aIdx}, -1)">↑</button>
                            <button class="btn-move" onclick="moveSeg(event, ${tIdx}, ${aIdx}, 1)">↓</button>
                            <div class="counter-badge" onclick="toggleMoveFocus(event, ${tIdx}, ${aIdx})">${abs.bezeichnung}</div>
                        </div>
                        <div class="segment-actions">
                            <button class="btn-primary" style="padding:8px 12px;" onclick="openInMaps(${tIdx}, ${aIdx}); event.stopPropagation();">📍 Maps</button>
                            <button class="btn-danger" style="padding:8px 12px;" onclick="safeDeleteSegment(${tIdx}, ${aIdx}); event.stopPropagation();">Löschen</button>
                        </div>
                    </div>
                    <div class="segment-details" id="details-${tIdx}-${aIdx}">${stopsHtml}</div>`;
                tourDiv.appendChild(segDiv);
            });
            area.appendChild(tourDiv);
        });
    }

    // Markiert eine Zeile gelb oder nimmt die Markierung weg
    function toggleMoveFocus(event, tIdx, aIdx) {
        event.stopPropagation();
        const key = `${tIdx}-${aIdx}`;
        if (activeRowKey === key) {
            activeRowKey = null; // Abwählen
        } else {
            activeRowKey = key; // Neu wählen
        }
        renderEditor();
    }

    function moveSeg(event, tIdx, aIdx, direction) {
        event.stopPropagation();
        const tour = projectData.touren[tIdx];
        const newIdx = aIdx + direction;
        
        if (newIdx >= 0 && newIdx < tour.abschnitte.length) {
            const temp = tour.abschnitte[aIdx];
            tour.abschnitte[aIdx] = tour.abschnitte[newIdx];
            tour.abschnitte[newIdx] = temp;
            
            // Fokus mitwandern lassen
            activeRowKey = `${tIdx}-${newIdx}`;
            
            reindexSegments(tour);
            renderEditor();
        }
    }

    function editTourName(tIdx) {
        const newName = prompt("Neuer Name:", projectData.touren[tIdx].name);
        if (newName) { projectData.touren[tIdx].name = newName; renderEditor(); }
    }

    function toggleDetails(tIdx, aIdx) {
        const el = document.getElementById(`details-${tIdx}-${aIdx}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function openInMaps(tIdx, aIdx) {
        const points = projectData.touren[tIdx].abschnitte[aIdx].stopps;
        const dest = `${points[points.length-1].lat},${points[points.length-1].lng}`;
        const ways = points.slice(0, -1).map(p => `${p.lat},${p.lng}`).join('|');
        window.open(`comgooglemaps://?saddr=&daddr=${dest}&waypoints=${ways}&directionsmode=driving`, '_blank');
    }

    function safeDeleteStop(tIdx, aIdx, sIdx) {
        if(confirm("Löschen?")) { projectData.touren[tIdx].abschnitte[aIdx].stopps.splice(sIdx, 1); renderEditor(); document.getElementById(`details-${tIdx}-${aIdx}`).style.display = 'block'; }
    }
    function safeDeleteSegment(tIdx, aIdx) {
        if(confirm("Abschnitt löschen?")) { projectData.touren[tIdx].abschnitte.splice(aIdx, 1); reindexSegments(projectData.touren[tIdx]); renderEditor(); }
    }
    function safeDeleteTour(tIdx) {
        if(confirm("Ganze Tour löschen?")) { projectData.touren.splice(tIdx, 1); renderEditor(); }
    }
    function safeReset() {
        if(confirm("Editor leeren?")) { projectData = { touren: [] }; renderEditor(); }
    }

    function downloadJSON() {
        let filename = prompt("Dateiname:", "beleuchtungskontrolle_export");
        if (!filename) return;
        if (!filename.endsWith(".json")) filename += ".json";
        const dataStr = JSON.stringify(projectData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }

    window.onload = updateTheme;
</script>
</body>
</html>
