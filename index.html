<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Route-Master 2026</title>

    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --primary: #3b82f6; --accent: #8b5cf6; --success: #22c55e; 
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px;
            line-height: 1.5;
        }

        h1 { 
            font-size: 1.5rem; text-align: center; color: var(--primary); 
            margin: 20px 0; letter-spacing: 1px; text-transform: uppercase;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #334155; 
            margin-bottom: 20px; 
        }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; font-weight: bold; }

        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 12px; background: #334155; 
            color: white; border: 1px solid #475569; font-size: 1rem; 
            margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 14px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .btn-secondary { background: #475569; }
        .btn-success { background: var(--success); grid-column: span 2; margin-top: 10px; }

        #output { 
            background: #020617; color: #10b981; font-family: monospace; 
            font-size: 0.85rem; padding: 15px; border-radius: 12px; 
            max-height: 300px; overflow-y: auto; white-space: pre-wrap;
            border: 1px solid #1e293b;
        }

        /* PC-Optimierung */
        @media (min-width: 768px) {
            h1 { font-size: 2rem; margin: 40px 0; }
            .card { padding: 30px; }
            button:hover { filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠 Route-Master 2026</h1>

        <div class="card">
            <label>TomTom ITN Datei einlesen:</label>
            <input type="file" id="itnInput" accept=".itn">
            <div class="btn-group">
                <button onclick="processITN()">ITN KONVERTIEREN</button>
                <button class="btn-secondary" onclick="clearAll()">LÖSCHEN</button>
            </div>
        </div>

        <div class="card">
            <label>Tour Nummer (z.B. 05):</label>
            <input type="text" id="tourId" placeholder="z.B. 03">
            
            <label>Stadtteil / Name:</label>
            <input type="text" id="tourName" placeholder="z.B. Derendorf">
            
            <label>Abschnitts-Bezeichnung:</label>
            <input type="text" id="segName" placeholder="z.B. 03-01">
        </div>

        <div class="card">
            <label>Vorschau JSON-Daten:</label>
            <div id="output">Noch keine Daten verarbeitet...</div>
            
            <button class="btn-success" onclick="downloadJSON()">
                💾 JSON DATEI SPEICHERN
            </button>
        </div>
    </div>

<script>
    let currentStops = [];

    function processITN() {
        const file = document.getElementById('itnInput').files[0];
        if (!file) return alert("Bitte erst eine .itn Datei wählen!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            currentStops = [];
            
            lines.forEach(line => {
                if (line.includes('|')) {
                    const parts = line.split('|');
                    if (parts.length >= 3) {
                        // ITN Format: Longitude|Latitude|Name|Flag
                        // Wir brauchen Lat/Lng als Dezimalzahl
                        const lng = (parseInt(parts[0]) / 100000).toFixed(5);
                        const lat = (parseInt(parts[1]) / 100000).toFixed(5);
                        const name = parts[2].trim();
                        currentStops.push({ lat, lng, name });
                    }
                }
            });

            updatePreview();
        };
        reader.readAsText(file);
    }

    function updatePreview() {
        const tourId = document.getElementById('tourId').value || "XX";
        const tourName = document.getElementById('tourName').value || "Unbekannt";
        const segName = document.getElementById('segName').value || "Abschnitt 1";

        const result = {
            touren: [{
                id: tourId,
                name: tourName,
                abschnitte: [{
                    bezeichnung: segName,
                    stopps: currentStops
                }]
            }]
        };

        document.getElementById('output').innerText = JSON.stringify(result, null, 2);
    }

    function downloadJSON() {
        const jsonStr = document.getElementById('output').innerText;
        if (currentStops.length === 0) return alert("Keine Daten zum Speichern vorhanden!");
        
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `route_${document.getElementById('tourId').value || 'export'}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function clearAll() {
        if(confirm("Alle Eingaben löschen?")) {
            document.getElementById('itnInput').value = "";
            document.getElementById('tourId').value = "";
            document.getElementById('tourName').value = "";
            document.getElementById('segName').value = "";
            document.getElementById('output').innerText = "Noch keine Daten...";
            currentStops = [];
        }
    }
</script>
</body>
</html>
